<svg width="100" height="100" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- X Element -->
  <path d="M25 25L75 75" stroke="#ff007f" stroke-width="8" stroke-linecap="round" stroke-linejoin="round">
    <animate attributeName="stroke-dasharray" from="0,100" to="100,0" dur="1s" fill="freeze" />
  </path>
  <path d="M75 25L25 75" stroke="#ff007f" stroke-width="8" stroke-linecap="round" stroke-linejoin="round">
    <animate attributeName="stroke-dasharray" from="0,100" to="100,0" dur="1s" fill="freeze" />
  </path>
  
  <!-- O Element -->
  <circle cx="50" cy="50" r="35" stroke="#00f3ff" stroke-width="8" stroke-linecap="round" stroke-linejoin="round">
    <animate attributeName="stroke-dasharray" from="0,220" to="220,0" dur="1.5s" fill="freeze" />
  </circle>

  <!-- Glow effects -->
  <defs>
    <filter id="glowX" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="glowO" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
</svg>
